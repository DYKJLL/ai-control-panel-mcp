<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 控制面板</title>
<style>
:root{
  --bg:#0a0e14;
  --surface:#121820;
  --surface2:#1a2330;
  --border:#1e2d3d;
  --text:#d1dce8;
  --text2:#8899aa;
  --accent:#4f9fff;
  --accent-glow:rgba(79,159,255,.2);
  --green:#3dd68c;
  --red:#f14c4c;
  --gold:#f0b429;
  --radius:12px;
  --shadow:0 2px 12px rgba(0,0,0,.3);
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;line-height:1.5;min-height:100vh}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.layout{display:flex;flex-direction:column;min-height:100vh}

/* Header */
header{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
header h1{font-size:17px;font-weight:600;letter-spacing:-.3px;display:flex;align-items:center;gap:10px}
header h1::before{content:'';display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.status-bar{display:flex;gap:20px;font-size:12px}
.status-bar span{color:var(--text2);display:flex;align-items:center;gap:5px}
.status-bar .val{color:var(--text);font-weight:500}

/* Grid */
.grid{padding:20px 24px;display:grid;grid-template-columns:320px 1fr;gap:14px;flex:1}
@media(max-width:900px){.grid{grid-template-columns:1fr}}

/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;transition:border-color .2s,box-shadow .2s}
.card:hover{border-color:#2a4060;box-shadow:0 0 0 1px var(--accent-glow)}
.card h2{font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px;display:flex;align-items:center;gap:8px}

/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.stat{text-align:center;padding:14px 6px;background:var(--bg);border-radius:8px;transition:transform .15s}
.stat:hover{transform:translateY(-2px)}
.stat .num{display:block;font-size:24px;font-weight:700;letter-spacing:-.5px}
.stat .label{font-size:11px;color:var(--text2);margin-top:3px}
.stat.pending .num{color:var(--gold)}
.stat.running .num{color:var(--accent)}
.stat.completed .num{color:var(--green)}
.stat.failed .num{color:var(--red)}
.stat.total .num{color:var(--text)}

/* Proxy */
.proxy-info{font-size:13px;padding:8px 12px;background:var(--bg);border-radius:8px;margin-bottom:10px}
.proxy-info .row{display:flex;justify-content:space-between;padding:4px 0}
.proxy-info .row span:last-child{color:var(--text2)}
.proxy-controls{display:flex;gap:6px}
.proxy-controls select{flex:1;padding:7px 10px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;cursor:pointer}
.proxy-controls select:focus{border-color:var(--accent)}

/* Buttons */
.btn{padding:7px 16px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#3d8af5;box-shadow:0 0 16px var(--accent-glow)}
.btn-success{background:var(--green);color:#0a0e14}
.btn-success:hover{opacity:.9}
.btn-danger{background:var(--red);color:#fff}
.btn-danger:hover{opacity:.9}
.btn-sm{padding:4px 10px;font-size:12px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;transition:all .15s}
.btn-sm:hover{background:var(--surface2);color:var(--text);border-color:#2a4060}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text2)}
.btn-ghost:hover{background:var(--surface2);color:var(--text)}

/* Accounts */
.account-list{display:flex;flex-direction:column;gap:6px}
.account-item{display:flex;align-items:center;padding:10px 12px;background:var(--bg);border-radius:8px;gap:10px;transition:transform .15s}
.account-item:hover{transform:translateX(3px)}
.account-item .icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.account-item .icon.doubao{background:linear-gradient(135deg,#1a73e8,#0d47a1);color:#fff}
.account-item .icon.qianwen{background:linear-gradient(135deg,#ff6f00,#e65100);color:#fff}
.account-item .icon.custom{background:var(--surface2);color:var(--text2)}
.account-item .info{flex:1;min-width:0}
.account-item .info .name{font-weight:500;font-size:13px}
.account-item .info .meta{font-size:11px;color:var(--text2);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.account-status{font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;white-space:nowrap}
.account-status.active{background:rgba(61,214,140,.12);color:var(--green)}
.account-status.inactive{background:rgba(241,76,76,.12);color:var(--red)}
.account-status.logging_in{background:rgba(240,180,41,.12);color:var(--gold)}

/* Account actions */
.account-actions{display:flex;gap:4px}

/* Add account */
details{overflow:hidden}
details summary{cursor:pointer;font-size:13px;font-weight:500;color:var(--accent);padding:8px 0;user-select:none;transition:color .2s}
details summary:hover{color:#6fb3ff}
.add-form{display:flex;flex-direction:column;gap:8px;padding-top:10px}
.add-form input{width:100%;padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;transition:border-color .2s}
.add-form input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.add-form input::placeholder{color:#4a5a6a}

/* Login progress */
.login-progress{display:none;margin-top:8px;padding:12px;background:var(--bg);border-radius:8px;font-size:13px;border:1px solid var(--border)}
.login-progress .bar{height:3px;background:var(--border);border-radius:2px;margin-top:8px;overflow:hidden}
.login-progress .bar-inner{height:100%;width:30%;background:var(--accent);border-radius:2px;animation:loading 1.5s infinite}
@keyframes loading{0%{transform:translateX(-100%)}100%{transform:translateX(400%)}}
.login-progress .actions{display:flex;gap:6px;margin-top:8px}

/* Function debug */
.fn-debug{display:flex;flex-direction:column;gap:8px}
.fn-debug select,.fn-debug textarea{width:100%;padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;transition:border-color .2s}
.fn-debug select:focus,.fn-debug textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.fn-debug textarea{resize:vertical;font-family:inherit}
.fn-result{padding:10px 12px;background:var(--bg);border-radius:8px;font-size:12px;max-height:200px;overflow:auto;white-space:pre-wrap;word-break:break-all;font-family:'JetBrains Mono','Fira Code',monospace;line-height:1.5;margin-top:4px;border:1px solid var(--border)}

/* Log */
.log-section{margin:0 24px 20px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px}
.log-section h2{font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.log-list{max-height:180px;overflow-y:auto;font-size:12px;line-height:1.7;font-family:'JetBrains Mono','Fira Code',monospace}
.log-item{padding:3px 8px;border-radius:4px;margin-bottom:1px}
.log-item:hover{background:var(--surface2)}
.log-item.error{color:var(--red)}
.log-item.success{color:var(--green)}
.log-item.info{color:var(--text2)}
.log-item.warn{color:var(--gold)}

/* Empty state */
.empty{color:var(--text2);font-size:13px;padding:12px 0;text-align:center}
</style>
</head>
<body>
<div class="layout">
  <header>
    <h1>AI 控制面板</h1>
    <div class="status-bar">
      <span id="serverStatus"><span class="val">●</span> 运行中</span>
      <span>代理 <span class="val" id="proxyStatus">-</span></span>
      <span>队列 <span class="val" id="queueStatus">0</span></span>
    </div>
  </header>

  <div class="grid">
    <!-- Queue Stats -->
    <section class="card">
      <h2>📊 任务队列</h2>
      <div class="stats-grid">
        <div class="stat total"><span class="num" id="totalTasks">0</span><span class="label">总计</span></div>
        <div class="stat pending"><span class="num" id="pendingTasks">0</span><span class="label">等待</span></div>
        <div class="stat running"><span class="num" id="runningTasks">0</span><span class="label">运行中</span></div>
        <div class="stat completed"><span class="num" id="completedTasks">0</span><span class="label">完成</span></div>
        <div class="stat failed"><span class="num" id="failedTasks">0</span><span class="label">失败</span></div>
      </div>
    </section>

    <!-- Proxy -->
    <section class="card">
      <h2>🌐 代理状态</h2>
      <div class="proxy-info" id="proxyInfo">加载中...</div>
      <div class="proxy-controls">
        <select id="proxyModeSelect">
          <option value="tor">Tor 匿名</option>
          <option value="workers">Cloudflare Workers</option>
          <option value="direct">直连</option>
        </select>
        <button class="btn btn-primary" onclick="switchProxy()">切换</button>
      </div>
    </section>

    <!-- Accounts (full width) -->
    <section class="card" style="grid-column:1/3">
      <h2>👤 账号管理</h2>
      <div id="accountList"><div class="empty">加载中...</div></div>

      <details>
        <summary>+ 添加新账号</summary>
        <div class="add-form">
          <input id="accService" placeholder="服务名 (doubao, qianwen...)" value="custom">
          <input id="accLabel" placeholder="标签 (如 主账号)">
          <input id="accUrl" placeholder="网址 (如 https://www.doubao.com)">
          <button class="btn btn-primary" onclick="startLogin()" id="btnStartLogin">打开浏览器并登录</button>
        </div>
        <div id="loginProgress" class="login-progress">
          <span id="loginStatus">浏览器已打开，请在浏览器中完成登录...</span>
          <div class="bar"><div class="bar-inner"></div></div>
          <div class="actions">
            <button class="btn btn-success" onclick="confirmLogin()" id="btnConfirmLogin">✓ 已完成，捕获信息</button>
            <button class="btn btn-ghost" onclick="cancelLogin()" id="btnCancelLogin">取消</button>
          </div>
        </div>
      </details>
    </section>

    <!-- Function Debug (full width) -->
    <section class="card" style="grid-column:1/3">
      <h2>⚡ 函数调试</h2>
      <div class="fn-debug">
        <select id="fnSelect"><option value="">选择函数...</option></select>
        <textarea id="fnParams" rows="3" placeholder='参数 JSON (可选)'></textarea>
        <button class="btn btn-primary" onclick="callFunction()" style="align-self:flex-start">调用</button>
      </div>
      <pre id="fnResult" class="fn-result"></pre>
    </section>
  </div>

  <section class="log-section">
    <h2>📋 日志</h2>
    <div id="logList" class="log-list"><div class="empty">暂无日志</div></div>
  </section>
</div>
<script src="/static/app.js"></script>
</body>
</html>
